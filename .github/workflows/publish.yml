name: Publish to npm

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: npm-publish
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - uses: actions/setup-node@v6
        with:
          # Pin the minor so we get a Node image whose bundled npm is
          # known-good. 22.22.2's bundled npm ships with a broken arborist
          # (Cannot find module 'promise-retry') which made the previous
          # `npm install -g npm@latest` step fail before it could
          # self-upgrade.
          node-version: 22.20.0
          registry-url: https://registry.npmjs.org

      # Node 22.20 ships npm 10.9.x, which already supports OIDC trusted
      # publishing. No self-upgrade needed. If a future npm feature
      # requires a newer version, pin it explicitly (e.g. `npm@11.5`)
      # rather than tracking @latest, to avoid inheriting runner-image
      # regressions.

      - run: bun install
      - run: bun run build

      - name: Check if version already published
        id: version-check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PKG_NAME}@${PKG_VERSION}" version 2>/dev/null; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "${PKG_NAME}@${PKG_VERSION} already published, skipping"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.version-check.outputs.published == 'false'
        run: npm publish --provenance --access public
